<div class="h-screen w-full flex flex-col bg-gray-50 overflow-hidden">
  
<nav class="flex-shrink-0 flex items-center justify-between p-4 bg-gray-900 text-white shadow-md z-10">
    <div class="flex items-center gap-3">
      <img src="assets/favicon.ico" alt="AC-CORE Logo" class="w-8 h-8 object-contain bg-white rounded p-1">
      <span class="text-lg font-bold tracking-wide">AC-CORE Admin Portal</span>
    </div>
    <button (click)="onLogout()" class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded transition-colors">
      Logout
    </button>
  </nav>

  <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative z-0">
    
    <aside class="w-full md:w-1/3 lg:w-1/4 h-full bg-white border-r border-gray-200 shadow-lg overflow-y-auto flex flex-col z-10">
      
      <div class="p-4 border-b border-gray-100 bg-gray-50 flex-shrink-0">
        <h2 class="text-lg font-bold text-gray-800">Active Hazards</h2>
        <p class="text-xs text-gray-500 mt-1">Click a report to view on map</p>
      </div>

      <div *ngIf="isLoading" class="p-8 flex justify-center items-center text-gray-500">
        <svg class="animate-spin h-6 w-6 text-blue-600 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Loading data...
      </div>

      <div *ngIf="errorMessage" class="p-4 text-sm text-red-600 bg-red-50 m-4 rounded border border-red-200">
        {{ errorMessage }}
      </div>

      <div class="flex-1 overflow-y-auto">
        <div *ngFor="let report of reports" 
             (click)="focusOnReport(report)"
             class="p-4 border-b border-gray-100 cursor-pointer hover:bg-blue-50 transition-colors">
          
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-gray-900 text-sm truncate pr-2">{{ report.title }}</h3>
            <span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded-full tracking-wider flex-shrink-0"
              [ngClass]="{
                'bg-red-100 text-red-800': report.status === 'Reported',
                'bg-blue-100 text-blue-800': report.status === 'Dispatched',
                'bg-green-100 text-green-800': report.status === 'Resolved'
              }">
              {{ report.status }}
            </span>
          </div>
          
          <div class="text-xs text-gray-500 flex flex-col gap-1">
            <span class="flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              Brgy. {{ report.barangay }}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              {{ report.createdAt | date:'short' }}
            </span>
          </div>

        </div>
        
        <div *ngIf="!isLoading && reports.length === 0" class="p-8 text-center text-gray-400 text-sm">
          No hazard reports found in the system.
        </div>
      </div>
      
    </aside>

    <main class="flex-1 h-full w-full relative z-0">
      <div id="admin-map" class="w-full h-full"></div>
    </main>

  </div>
</div>
