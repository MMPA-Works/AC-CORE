<main class="auth-container">
  <hlm-toaster class="z-50" [richColors]="true" [expand]="false" />

  <div class="auth-card">
    <div class="auth-left-panel">
      <div class="sphere w-48 h-48 -top-16 -left-16"></div>
      <div class="sphere w-32 h-32 bottom-5 right-0"></div>
      
      <div class="relative z-10">
        <img src="/logo.svg" class="w-16 h-16 mb-4 brightness-0 invert" alt="AC-CORE Logo" />
        <h2 class="text-3xl font-extrabold mb-2 uppercase tracking-tighter leading-tight">
          Good to see <br/> you again
        </h2>
        <p class="text-red-100 opacity-90 text-sm leading-relaxed max-w-xs">
          Sign in to manage reports and track city updates.
        </p>
      </div>
    </div>

    <div class="flex-1 p-6 md:p-10 bg-white flex flex-col justify-center">
      <div class="mb-4">
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Sign in</h1>
        <p class="text-gray-500 text-sm mt-0.5">Access the AC-CORE Citizen Portal</p>
      </div>

      <div class="flex justify-center w-full mb-4">
        <asl-google-signin-button type="standard" size="medium" [width]="300"></asl-google-signin-button>
      </div>

      <div class="relative flex items-center mb-4">
        <div class="flex-grow border-t border-gray-100"></div>
        <span class="px-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Or login with email</span>
        <div class="flex-grow border-t border-gray-100"></div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-3">
        <div class="space-y-0.5">
          <label hlmLabel class="text-[9px] font-bold text-gray-400 uppercase ml-4">Email Address</label>
          <input hlmInput type="email" formControlName="email" placeholder="e.g. juan@example.com" 
                 class="w-full h-10 bg-gray-50 border-none rounded-full px-5 text-sm focus:ring-2 focus:ring-red-500" />
        </div>

        <div class="space-y-0.5">
          <label hlmLabel class="text-[9px] font-bold text-gray-400 uppercase ml-4">Password</label>
          <input hlmInput type="password" formControlName="password" placeholder="••••••••" 
                 class="w-full h-10 bg-gray-50 border-none rounded-full px-5 text-sm focus:ring-2 focus:ring-red-500" />
        </div>

        <div class="flex items-center space-x-2 px-4 py-1">
          <input type="checkbox" id="rememberMe" formControlName="rememberMe"
            class="w-3.5 h-3.5 text-red-700 border-gray-300 rounded focus:ring-red-500" />
          <label for="rememberMe" class="text-xs text-gray-600">Remember Me</label>
        </div>

        <button hlmBtn type="submit" 
                class="w-full h-11 bg-[#ac1001] hover:bg-[#8e0d01] text-white rounded-full font-bold shadow-md mt-2 transition-all active:scale-95"
                [disabled]="isLoading() || loginForm.invalid">
          <span *ngIf="!isLoading()">Sign In</span>
          <span *ngIf="isLoading()">Authenticating...</span>
        </button>
      </form>

      <p class="text-center text-xs text-gray-500 mt-6">
        Don't have an account? 
        <a href="/citizen/signup" class="text-[#ac1001] font-bold hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</main>
