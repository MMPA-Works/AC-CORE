<div class="space-y-5">
  <p class="text-[1.05rem] font-medium text-foreground">Progress Status</p>

  <div class="relative pt-2">
    <div class="absolute left-10 right-10 top-7 h-0.5 bg-border"></div>
    <div class="absolute left-10 top-7 h-0.5 bg-primary transition-all duration-300" [style.width]="progressWidth()"></div>

    <ol class="relative grid grid-cols-4 gap-2">
      @for (step of steps; track step; let index = $index) {
        <li class="flex flex-col items-center gap-3 text-center">
          <span
            class="flex h-9 w-9 items-center justify-center rounded-full border text-sm font-semibold transition-colors shadow-sm"
            [ngClass]="{
              'border-primary bg-primary text-primary-foreground': isComplete(index) || isCurrent(index),
              'border-border bg-card text-muted-foreground': !isComplete(index) && !isCurrent(index)
            }"
          >
            @if (showCompletedIcon(index)) {
              <lucide-icon name="check" class="h-4 w-4"></lucide-icon>
            } @else {
              {{ index + 1 }}
            }
          </span>
          <p class="text-[11px] font-semibold leading-4 text-foreground">{{ step }}</p>
        </li>
      }
    </ol>
  </div>
</div>
