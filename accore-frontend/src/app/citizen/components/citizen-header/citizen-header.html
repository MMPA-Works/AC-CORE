<header class="border-b border-border bg-background/95 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4 sm:px-6">
    
    <a [routerLink]="isLoggedIn() ? '/citizen/dashboard' : '/'" (click)="closeMenu()" class="flex items-center gap-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded-md">
      <img src="logo.svg" alt="AC-CORE Logo" class="h-8 w-8 object-contain">
      <div class="flex flex-col justify-center">
        <span class="text-lg font-bold leading-none tracking-tight text-foreground">AC-CORE</span>
        <span class="mt-0.5 text-[10px] font-semibold uppercase tracking-wider text-primary">
          {{ isLoggedIn() ? 'Citizen Portal' : 'Angeles City' }}
        </span>
      </div>
    </a>

    @if (isLoggedIn()) {
      <nav class="hidden md:flex md:items-center md:gap-6 lg:gap-8">
        @for (item of navItems; track item.route) {
          <a [routerLink]="item.route" 
             class="flex items-center gap-2 text-sm font-medium transition-colors px-2 py-1"
             [ngClass]="isActive(item.aliases) ? 'text-primary' : 'text-muted-foreground hover:text-foreground'">
            <lucide-icon [name]="item.icon" class="h-4 w-4"></lucide-icon>
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="hidden items-center md:flex">
        <button (click)="onLogout()" class="group inline-flex items-center gap-2 text-sm font-medium text-muted-foreground hover:text-red-700">
          <span>Sign Out</span>
          <lucide-icon name="log-out" class="h-4 w-4 transition-transform group-hover:-translate-x-1"></lucide-icon>
        </button>
      </div>
    } @else {
      <div class="hidden items-center gap-4 md:flex">
        <a routerLink="/citizen/login" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors px-2 py-1">Login</a>
        <a routerLink="/citizen/signup" class="rounded-md bg-red-700 px-4 py-2 text-sm font-medium text-white hover:bg-red-800 transition-colors">Sign Up</a>
      </div>
    }

    @if (isLoggedIn()) {
      <button class="md:hidden inline-flex h-9 w-9 items-center justify-center rounded-md border border-border" (click)="toggleMenu()">
        <lucide-icon [name]="isMobileMenuOpen() ? 'x' : 'grip'" class="h-5 w-5"></lucide-icon>
      </button>
    }
  </div>
</header>

@if (isLoggedIn()) {
  <div class="fixed inset-0 top-16 z-40 flex flex-col bg-background/95 backdrop-blur-md transition-all duration-300 md:hidden"
       [ngClass]="isMobileMenuOpen() ? 'translate-y-0 opacity-100' : '-translate-y-4 opacity-0 pointer-events-none'">
    <nav class="flex flex-1 flex-col gap-2 px-4 py-6">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" (click)="closeMenu()" 
           class="flex items-center gap-4 rounded-lg px-4 py-4"
           [ngClass]="isActive(item.aliases) ? 'bg-primary/10 text-primary' : 'text-muted-foreground'">
          <lucide-icon [name]="item.icon" class="h-5 w-5"></lucide-icon>
          <span class="text-base font-semibold">{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="border-t border-border p-4 pb-8">
      <button (click)="onLogout()" class="flex w-full items-center justify-center gap-2 rounded-lg bg-muted px-4 py-4 text-muted-foreground font-semibold">
        <lucide-icon name="log-out" class="h-5 w-5"></lucide-icon> Sign Out
      </button>
    </div>
  </div>
}
