<nav class="sticky top-0 z-50 w-full border-b border-neutral-200 bg-white/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-4 md:flex-row md:items-center md:justify-between md:px-6">
    
    <a routerLink="/citizen/dashboard" class="flex items-center gap-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 transition-opacity hover:opacity-80">
      <img src="logo.svg" alt="Angeles Fix-It Logo" class="h-9 w-9 object-contain">
      <div>
        <p class="text-sm font-bold tracking-tight text-neutral-900">AC-CORE</p>
        <p class="text-[10px] font-medium uppercase tracking-wider text-neutral-500">Citizen Portal</p>
      </div>
    </a>

    <div class="flex flex-col gap-3 md:flex-row md:items-center">
      <div class="flex flex-wrap items-center gap-2">
        @for (item of navItems; track item.route) {
          <a
            [routerLink]="item.route"
            class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2"
            [ngClass]="isActive(item.aliases)
              ? 'bg-red-50 text-red-700' 
              : 'text-neutral-500 hover:bg-neutral-100 hover:text-neutral-900'"
          >
            <lucide-icon [name]="item.icon" class="h-4 w-4"></lucide-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>

      <div class="hidden h-6 w-px bg-neutral-200 md:block"></div>

      <button 
        class="inline-flex items-center justify-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-neutral-600 transition-colors hover:bg-red-50 hover:text-red-700 focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 md:justify-start" 
        (click)="onLogout()"
      >
        <lucide-icon name="log-out" class="h-4 w-4"></lucide-icon>
        <span>Logout</span>
      </button>
    </div>
  </div>
</nav>
