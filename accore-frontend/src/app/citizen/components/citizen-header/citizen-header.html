<header class="border-b border-gray-100 bg-white/90 backdrop-blur-md shadow-sm">
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4 sm:px-6">
    
    <a [routerLink]="isLoggedIn() ? '/citizen/dashboard' : '/'" (click)="closeMenu()" class="flex items-center gap-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ac1001] rounded-md">
      <img src="/logo/logo.svg" alt="Official AC-CORE Municipal Logo for Angeles City" class="h-8 w-8 object-contain">
      <div class="flex flex-col justify-center text-left">
        <span class="text-lg font-bold leading-none tracking-tight text-gray-900">AC-CORE</span>
        <span class="mt-0.5 text-[10px] font-semibold uppercase tracking-wider text-[#ac1001]">
          {{ isLoggedIn() ? 'Citizen Portal' : 'Angeles City' }}
        </span>
      </div>
    </a>

    @if (isLoggedIn()) {
      <nav class="hidden md:flex md:items-center md:gap-6 lg:gap-8">
        @for (item of navItems; track item.route) {
          <a [routerLink]="item.route" 
             class="flex items-center gap-2 text-sm font-medium transition-colors px-2 py-1"
             [ngClass]="isActive(item.aliases) ? 'text-[#ac1001]' : 'text-gray-500 hover:text-gray-900'">
            <lucide-icon [name]="item.icon" class="h-4 w-4"></lucide-icon>
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="hidden items-center md:flex">
        <button (click)="onLogout()" class="group inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-red-700">
          <span>Sign Out</span>
          <lucide-icon name="log-out" class="h-4 w-4 transition-transform group-hover:-translate-x-1"></lucide-icon>
        </button>
      </div>
    } @else {
      <div class="flex items-center gap-4">
        <a routerLink="/citizen/login" class="text-sm font-bold text-gray-600 hover:text-[#ac1001] transition-colors px-2 py-1">
          Login
        </a>
        <a routerLink="/citizen/signup" hlmBtn class="inline-flex items-center justify-center bg-gradient-to-r from-[#ac1001] to-[#f99b36] hover:opacity-90 border-0 text-white font-bold h-9 px-5 rounded-full shadow-md transition-opacity">
          Sign Up
        </a>
      </div>
    }

    @if (isLoggedIn()) {
      <button class="md:hidden inline-flex h-9 w-9 items-center justify-center rounded-md border border-gray-200" (click)="toggleMenu()">
        <lucide-icon [name]="isMobileMenuOpen() ? 'x' : 'grip'" class="h-5 w-5"></lucide-icon>
      </button>
    }
  </div>
</header>

@if (isLoggedIn()) {
  <div class="fixed inset-0 top-16 z-40 flex flex-col bg-white/95 backdrop-blur-md transition-all duration-300 md:hidden"
       [ngClass]="isMobileMenuOpen() ? 'translate-y-0 opacity-100' : '-translate-y-4 opacity-0 pointer-events-none'">
    <nav class="flex flex-1 flex-col gap-2 px-4 py-6">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" (click)="closeMenu()" 
           class="flex items-center gap-4 rounded-lg px-4 py-4"
           [ngClass]="isActive(item.aliases) ? 'bg-red-50 text-[#ac1001]' : 'text-gray-500'">
          <lucide-icon [name]="item.icon" class="h-5 w-5"></lucide-icon>
          <span class="text-base font-semibold">{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="border-t border-gray-200 p-4 pb-8">
      <button (click)="onLogout()" class="flex w-full items-center justify-center gap-2 rounded-lg bg-gray-50 px-4 py-4 text-gray-500 font-semibold">
        <lucide-icon name="log-out" class="h-5 w-5"></lucide-icon> Sign Out
      </button>
    </div>
  </div>
}
